devpanel_marketplace_bar.webhook:
  path: '/api/webhook/devpanel-sync'
  defaults:
    _controller: '\Drupal\devpanel_marketplace_bar\Controller\DevpanelWebhookController::receive'
  requirements:
    _access: 'TRUE'
  methods: [POST]

devpanel_marketplace_bar.settings:
  path: '/admin/config/system/devpanel-marketplace-bar'
  defaults:
    _form: '\Drupal\devpanel_marketplace_bar\Form\SettingsForm'
    _title: 'DevPanel Marketplace Bar Settings'
  requirements:
    _permission: 'administer site configuration'
